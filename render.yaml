# Render Blueprint — deploys bookleaf-backend and bookleaf-frontend as separate Web Services.
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO USE
# ----------
# 1. Push this repo to GitHub / GitLab.
# 2. Go to https://dashboard.render.com → "New" → "Blueprint".
# 3. Connect your repo — Render will detect this file automatically.
# 4. Before the first deploy, set the two "sync: false" secrets in the dashboard:
#      bookleaf-backend  →  MONGODB_URI, OPENAI_API_KEY
#      bookleaf-frontend →  NEXT_PUBLIC_API_URL  (e.g. https://bookleaf-backend.onrender.com/api)
# 5. Deploy.  JWT_SECRET is auto-generated; NEXT_PUBLIC_SOCKET_URL is wired automatically.

services:
  # ──────────────────────────────────────────────────────────────────────────
  # BACKEND — Express + Socket.io
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: bookleaf-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production

      # ── Secrets: set in the Render dashboard before first deploy ────────
      - key: MONGODB_URI
        sync: false        # MongoDB Atlas connection string

      - key: OPENAI_API_KEY
        sync: false        # OpenAI key for the AI suggestion feature (optional)

      # ── Auto-generated by Render on first deploy ─────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── Static values ────────────────────────────────────────────────────
      - key: JWT_EXPIRES_IN
        value: 7d

      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # ── Resolved from the frontend service after it is deployed ─────────
      - key: CLIENT_URL
        fromService:
          name: bookleaf-frontend
          type: web
          property: url    # e.g. https://bookleaf-frontend.onrender.com

  # ──────────────────────────────────────────────────────────────────────────
  # FRONTEND — Next.js
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: bookleaf-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

      # Backend REST API base URL — MUST include the /api suffix.
      # Set this manually after the backend service URL is known.
      # Example: https://bookleaf-backend.onrender.com/api
      - key: NEXT_PUBLIC_API_URL
        sync: false

      # Backend Socket.io URL — NO /api suffix.
      # Wired automatically from the backend service URL.
      - key: NEXT_PUBLIC_SOCKET_URL
        fromService:
          name: bookleaf-backend
          type: web
          property: url    # e.g. https://bookleaf-backend.onrender.com
